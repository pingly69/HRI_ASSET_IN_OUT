<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Property Pass - บันทึกขออนุญาต</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center;
            color: white; flex-direction: column;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <div class="loading-overlay" id="loadingOverlay">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-500 mb-4"></div>
        <p class="text-lg font-semibold" id="loadingText">กำลังประมวลผลและสร้างไฟล์ PDF...</p>
    </div>

    <header class="bg-blue-700 text-white p-6 shadow-md mb-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">ใบนำทรัพย์สินออก (Property Pass)</h1>
                <p class="text-xs opacity-70">ระบบลงทะเบียนขออนุญาตออนไลน์</p>
            </div>
            <div id="userProfile" class="flex items-center space-x-3">
                <img id="userImg" class="w-10 h-10 rounded-full border-2 border-white shadow-sm" src="https://via.placeholder.com/40">
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4">
        <form id="requestForm" onsubmit="event.preventDefault(); submitForm();">
            <!-- Section 1 -->
            <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                <h2 class="text-md font-bold border-b pb-2 mb-4 text-blue-800">1. ข้อมูลการเคลื่อนย้าย</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                    <div>
                        <label class="block font-medium text-gray-600">ประเภท</label>
                        <select id="transType" class="mt-1 block w-full rounded-md border-gray-300 p-2 border" required>
                            <option value="1">1. นำทรัพย์สินออกนอกพื้นที่ (ถาวร)</option>
                            <option value="2">2. นำออกและนำกลับคืน</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-medium text-gray-600">ชื่อผู้ขอ</label>
                        <input type="text" id="reqName" class="mt-1 block w-full rounded-md border-gray-300 p-2 border" required>
                    </div>
                    <div>
                        <label class="block font-medium text-gray-600">บริษัทผู้ขอ</label>
                        <input type="text" id="reqCompany" class="mt-1 block w-full rounded-md border-gray-300 p-2 border" required>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block font-medium text-gray-600">เลขทะเบียนรถ</label>
                            <input type="text" id="carNo" class="mt-1 block w-full rounded-md border-gray-300 p-2 border" required>
                        </div>
                        <div>
                            <label class="block font-medium text-gray-600">ประเภทรถ</label>
                            <input type="text" id="carType" class="mt-1 block w-full rounded-md border-gray-300 p-2 border" required>
                        </div>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block font-medium text-gray-600 text-blue-600">ผู้อนุมัติ</label>
                        <select id="approverName" class="mt-1 block w-full rounded-md border-blue-300 p-2 border bg-blue-50" required>
                            <option value="">-- กำลังดึงรายชื่อผู้อนุมัติ... --</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block font-medium text-gray-600">วัตถุประสงค์การขนย้าย</label>
                        <textarea id="purpose" rows="2" class="mt-1 block w-full rounded-md border-gray-300 p-2 border" required></textarea>
                    </div>
                </div>
            </div>

            <!-- Section 2 -->
            <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                <div class="flex justify-between items-center border-b pb-2 mb-4">
                    <h2 class="text-md font-bold text-blue-800">2. รายการทรัพย์สิน</h2>
                    <button type="button" onclick="addItem()" class="bg-blue-600 text-white px-3 py-1 rounded-md text-xs hover:bg-blue-700">
                        <i class="fas fa-plus"></i> เพิ่มรายการ
                    </button>
                </div>
                <div id="itemsContainer" class="space-y-4"></div>
            </div>

            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all text-lg">
                <i class="fas fa-save mr-2"></i> บันทึกข้อมูลและสร้างใบขออนุมัติ
            </button>
        </form>
    </main>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxu_uZxnbSDM_Gs3Zh0vGUWzGVwp7r_evllWLrmnlZg8VaTr73GGYNzEtJZhWkd6R_X/exec';
        let lineUid = 'unknown_user';

        async function initLiff() {
            try {
                await liff.init({ liffId: "2009016720-UeR6qqeG" });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    lineUid = profile.userId;
                    document.getElementById('reqName').value = profile.displayName || "";
                    if (profile.pictureUrl) document.getElementById('userImg').src = profile.pictureUrl;
                } else { liff.login(); }
            } catch (err) { console.error('LIFF Error:', err); }
        }

        async function fetchApprovers() {
            const select = document.getElementById('approverName');
            try {
                const res = await fetch(SCRIPT_URL);
                const result = await res.json();
                if (result.status === 'success') {
                    select.innerHTML = '<option value="">-- เลือกผู้อนุมัติ --</option>';
                    result.data.forEach(name => {
                        const opt = document.createElement('option');
                        opt.value = name; opt.innerText = name;
                        select.appendChild(opt);
                    });
                }
            } catch (err) { console.error('Fetch Error:', err); }
        }

        function addItem() {
            const id = 'item_' + Date.now();
            const html = `
                <div id="${id}" class="item-card bg-gray-50 p-4 rounded-lg border relative border-gray-200">
                    <button type="button" onclick="document.getElementById('${id}').remove()" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs shadow-md">×</button>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-3 text-sm">
                        <div class="md:col-span-2">
                            <label class="font-bold text-gray-700">รายละเอียดสิ่งของ</label>
                            <input type="text" class="item-desc w-full p-2 border rounded mt-1 border-gray-300" required>
                        </div>
                        <div class="hidden">
                            <input type="hidden" class="item-owner w-full" value="-">
                        </div>
                        <div>
                            <label class="font-bold text-gray-700">จำนวน</label>
                            <input type="number" class="item-qty w-full p-2 border rounded mt-1 border-gray-300" required min="1">
                        </div>
                        <div class="md:col-span-4 flex items-center space-x-4 pt-2">
                            <input type="file" class="item-img hidden" accept="image/*" capture="environment" id="file_${id}" onchange="handleImage(this, '${id}')">
                            <label for="file_${id}" class="bg-gray-200 px-4 py-2 rounded border cursor-pointer hover:bg-gray-300 text-xs">
                                <i class="fas fa-camera mr-1"></i> ถ่ายภาพ/แนบรูป
                            </label>
                            <div id="preview_${id}" class="hidden">
                                <img src="" class="h-16 w-16 object-cover rounded border-2 border-blue-400">
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('itemsContainer').insertAdjacentHTML('beforeend', html);
        }

        async function handleImage(input, id) {
            const file = input.files[0];
            if (!file) return;
            const previewDiv = document.getElementById('preview_' + id);
            const previewImg = previewDiv.querySelector('img');
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } }
                    else { if (height > MAX_WIDTH) { width *= MAX_WIDTH / height; height = MAX_WIDTH; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.7);
                    previewImg.src = base64;
                    previewDiv.classList.remove('hidden');
                    input.dataset.base64 = base64;
                };
            };
            reader.readAsDataURL(file);
        }

        async function submitForm() {
            const items = document.querySelectorAll('.item-card');
            if (items.length === 0) return Swal.fire('เตือน', 'กรุณาเพิ่มรายการสิ่งของ', 'warning');

            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex';

            try {
                const payload = {
                    header: {
                        transType: document.getElementById('transType').value,
                        reqName: document.getElementById('reqName').value,
                        reqCompany: document.getElementById('reqCompany').value,
                        carNo: document.getElementById('carNo').value,
                        carType: document.getElementById('carType').value,
                        purpose: document.getElementById('purpose').value,
                        approverName: document.getElementById('approverName').value,
                        lineUid: lineUid
                    },
                    details: []
                };

                items.forEach(item => {
                    const fileInput = item.querySelector('.item-img');
                    payload.details.push({
                        description: item.querySelector('.item-desc').value,
                        owner: '-',
                        qty: item.querySelector('.item-qty').value,
                        imageData: fileInput.dataset.base64 || ''
                    });
                });

                const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();

                if (result.status === 'success') {
                    Swal.fire({
                        icon: 'success',
                        title: 'บันทึกสำเร็จ',
                        html: `เลขที่เอกสาร: <b>${result.docno}</b><br><br>ระบบสร้างใบคำขอเรียบร้อยแล้ว`,
                        confirmButtonText: '<i class="fas fa-file-pdf mr-1"></i> เปิดดูใบคำขอ (PDF)',
                        showCancelButton: true,
                        cancelButtonText: 'กลับสู่ LINE',
                        confirmButtonColor: '#3085d6',
                        cancelButtonColor: '#6e7881',
                    }).then((res) => {
                        if (res.isConfirmed && result.pdfUrl) {
                            liff.openWindow({ url: result.pdfUrl, external: true });
                        }
                        liff.closeWindow();
                    });
                } else { throw new Error(result.message); }
            } catch (err) {
                Swal.fire('ล้มเหลว', err.message, 'error');
            } finally {
                overlay.style.display = 'none';
            }
        }

        window.onload = () => { fetchApprovers(); initLiff(); addItem(); };
    </script>
</body>
</html>
